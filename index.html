<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郭家私人 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root {
      --primary: #2B2D42;
      --primary-light: #8D99AE;
      --cyan: #8D99AE;
      --green: #2B8A5E;
      --red: #D90429;
      --orange: #EF233C;
      --purple: #2B2D42;
      --teal: #8D99AE;
      --gray: #8D99AE;
      --dark-gray: #2B2D42;
      --light-gray: #EDF2F4;
      --subtle-gray: #e4e9ec;
      --border: #d0d5d9;
      --bg-card: #ffffff;
      --bg-badge: #e4e9ec;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      font-size: 14px;
      background: var(--light-gray);
      color: #212529;
    }

    /* === Top Bar === */
    .topbar {
      background: #2B2D42;
      color: white;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; }
    .topbar .meta { font-size: 0.78rem; opacity: 0.8; }

    /* === Container === */
    .container { max-width: 1400px; margin: 0 auto; padding: 16px; }

    /* === KPI Cards === */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) { .kpi-grid { grid-template-columns: 1fr; } }
    @media (max-width: 1024px) and (min-width: 769px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    .kpi-card {
      background: var(--bg-card);
      padding: 18px 20px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 3px solid var(--primary);
    }
    .kpi-card .label { font-size: 0.78rem; color: var(--dark-gray); font-weight: 600; letter-spacing: 0.5px; }
    .kpi-card .value { font-size: 1.55rem; font-weight: 700; margin: 4px 0; }
    .kpi-card .sub { font-size: 0.8rem; color: var(--gray); }
    .kpi-card .sub [data-tooltip] { border-bottom: 1px dashed var(--gray); cursor: help; }

    /* === Tooltip === */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      white-space: nowrap;
      max-width: 380px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    [data-tooltip]:hover::before {
      content: "";
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--primary);
      z-index: 100;
    }

    /* === Filter Bar === */
    .filter-bar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: flex-end;
      background: var(--bg-card);
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.72rem; color: var(--primary); font-weight: 600; letter-spacing: 0.5px; }
    .filter-bar select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.82rem;
      background: white;
      cursor: pointer;
    }
    .filter-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .filter-bar button {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--primary);
      font-size: 0.82rem;
      background: var(--primary);
      color: white;
      cursor: pointer;
    }
    .filter-bar button:hover { opacity: 0.9; }
    .btn-secondary { background: white !important; color: var(--primary) !important; }

    /* === Charts === */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--bg-card);
      padding: 18px 20px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .chart-card h3 { font-size: 0.85rem; color: var(--dark-gray); margin-bottom: 12px; }
    .chart-card canvas { max-height: 320px; }

    /* === Tables === */
    .table-card {
      background: var(--bg-card);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .tab {
      padding: 12px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--gray);
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    .tab-content { padding: 16px 20px; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: var(--light-gray);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--dark-gray);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
    tr:hover { background: var(--subtle-gray); }
    .right { text-align: right; }

    /* === Value Colors === */
    .positive { color: #2B8A5E; }
    .negative { color: #D90429; }
    .neutral { color: var(--gray); }

    /* === Badges === */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 0.76rem;
    }
    .badge-account { background: #e4e9ec; color: #2B2D42; }
    .badge-buy { background: #d4eddf; color: #1a5a3a; border-radius: 4px; padding: 1px 7px; font-size: 0.74rem; }
    .badge-sell { background: #fdd; color: #9a0020; border-radius: 4px; padding: 1px 7px; font-size: 0.74rem; }

    /* === Loading === */
    .loading { text-align: center; padding: 60px; color: var(--gray); font-size: 1rem; }
    .error { text-align: center; padding: 60px; color: var(--red); }

    /* === Group Header === */
    .group-header td { background: var(--subtle-gray); font-weight: 600; color: var(--primary); }

    .footer-note { font-size: 0.75rem; color: var(--gray); padding: 8px 0; }

    /* === KPI Clickable === */
    .kpi-card { cursor: pointer; transition: box-shadow 0.2s, transform 0.1s; }
    .kpi-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .kpi-card.active { box-shadow: 0 0 0 2px var(--primary); }

    /* === Charts Module === */
    .charts-module { margin-bottom: 16px; }
    .charts-grid-single { display: grid; grid-template-columns: 1fr; gap: 12px; }

    /* === Event Filter === */
    .event-filter-bar {
      display: flex; gap: 8px; align-items: center; padding: 10px 20px;
      border-bottom: 1px solid var(--border); font-size: 0.82rem;
    }
    .event-filter-bar select { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.82rem; }
    .event-count { margin-left: auto; color: var(--gray); font-size: 0.78rem; }
    .event-pager { display: flex; gap: 4px; }
    .event-pager button { padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; background: white; cursor: pointer; font-size: 0.78rem; }
    .event-pager button:hover { background: var(--subtle-gray); }
    .event-pager button.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* === Position Bar === */
    .position-bar { margin-top: 8px; }
    .position-bar-track {
      width: 100%;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      background: var(--subtle-gray);
    }
    .position-bar-equity {
      height: 100%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
      font-weight: 600;
      min-width: 0;
      transition: width 0.3s;
    }
    .position-bar-cash {
      height: 100%;
      background: #8D99AE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
      font-weight: 600;
      flex: 1;
      transition: width 0.3s;
    }
    .position-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--gray);
    }

    /* === Date Filter === */
    .filter-bar input[type="date"] {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.82rem;
      background: white;
      cursor: pointer;
      color: #212529;
    }
    .date-filter-badge {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      background: #eef6fb;
      border: 1px solid #add5e8;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      color: #1a5a6e;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .date-filter-badge .badge-note {
      font-weight: 400;
      color: var(--gray);
      font-size: 0.76rem;
    }

    /* === Mobile Responsive (iPhone ~402px) === */
    @media (max-width: 480px) {
      body { font-size: 13px; }
      .topbar { padding: 10px 16px; }
      .topbar h1 { font-size: 1rem; }
      .topbar .meta { font-size: 0.72rem; }
      .container { padding: 10px; }
      .filter-bar {
        padding: 10px 14px;
        gap: 10px;
        flex-direction: column;
        align-items: stretch;
      }
      .filter-group { flex-direction: row; align-items: center; gap: 8px; }
      .filter-group label { min-width: 36px; font-size: 0.72rem; }
      .filter-bar select { flex: 1; font-size: 0.8rem; padding: 8px 10px; }
      .filter-actions { margin-left: 0; justify-content: stretch; }
      .filter-actions button { flex: 1; padding: 10px 12px; font-size: 0.82rem; }
      .kpi-grid { gap: 8px; margin-bottom: 12px; }
      .kpi-card { padding: 14px 16px; }
      .kpi-card .value { font-size: 1.35rem; }
      .kpi-card .label { font-size: 0.74rem; }
      .kpi-card .sub { font-size: 0.76rem; }
      .charts-grid { gap: 8px; margin-bottom: 12px; }
      .chart-card { padding: 14px 16px; }
      .chart-card h3 { font-size: 0.82rem; margin-bottom: 8px; }
      .chart-card canvas { max-height: 250px; }
      .tabs { padding: 0 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .tabs::-webkit-scrollbar { display: none; }
      .tab { padding: 10px 12px; font-size: 0.78rem; white-space: nowrap; flex-shrink: 0; }
      .tab-content { padding: 10px 12px; }
      table { font-size: 0.76rem; }
      th { padding: 6px 8px; font-size: 0.72rem; }
      td { padding: 6px 8px; }
      .event-filter-bar { flex-wrap: wrap; padding: 8px 12px; gap: 6px; font-size: 0.78rem; }
      .event-filter-bar select { font-size: 0.78rem; padding: 4px 6px; }
      .event-count { font-size: 0.72rem; }
      .event-pager button { font-size: 0.72rem; padding: 2px 6px; }
      .table-card + .table-card, .table-card[style*="margin-top"] { margin-top: 12px !important; }
      .position-bar-equity, .position-bar-cash { font-size: 0.65rem; }
      .position-bar-labels { font-size: 0.68rem; }
      [data-tooltip]:hover::after, [data-tooltip]:hover::before { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>郭家私人 Dashboard</h1>
  <div class="meta" id="lastUpdate">載入中...</div>
</div>

<div class="container">
  <!-- Filter Bar (Top) -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>市場</label>
      <select id="marketFilter" onchange="onMarketChange()">
        <option value="美股" selected>美股</option>
        <option value="台股">台股</option>
      </select>
    </div>
    <div class="filter-group">
      <label>帳戶</label>
      <select id="accountFilter" onchange="render()">
        <option value="ALL">全部帳戶</option>
      </select>
    </div>
    <div class="filter-group">
      <label>標的</label>
      <select id="tickerFilter" onchange="render()">
        <option value="ALL">全部標的</option>
      </select>
    </div>
    <div class="filter-group">
      <label>起日</label>
      <input type="date" id="dateFrom" value="" onchange="onDateFilterChange()">
    </div>
    <div class="filter-group">
      <label>訖日</label>
      <input type="date" id="dateTo" onchange="onDateFilterChange()">
    </div>
    <div class="filter-actions">
      <button onclick="refreshData()">更新資料</button>
      <button class="btn-secondary" onclick="resetFilters()">重置</button>
    </div>
  </div>

  <!-- 模塊 1：KPI Cards（可點擊切換圖表）-->
  <div id="dateFilterBadge" style="display:none" class="date-filter-badge">
    📅 期間績效模式：<span id="dateFilterLabel"></span>
    <span class="badge-note">（總資本、已實現損益依期間重算；未實現損益為即時值）</span>
  </div>
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading">載入中...</div>
  </div>

  <!-- 模塊 2：圖表區（根據 Card 點擊切換）-->
  <div id="chartsModule" class="charts-module">
    <div class="charts-grid" id="chartsGrid">
      <div class="chart-card">
        <h3 id="chart1Title">倉位配置（成本基準）</h3>
        <canvas id="chart1"></canvas>
      </div>
      <div class="chart-card">
        <h3 id="chart2Title">倉位配置（市值基準）</h3>
        <canvas id="chart2"></canvas>
      </div>
    </div>
  </div>

  <!-- 模塊 3：狀態表 -->
  <div class="table-card">
    <div class="tabs" id="statusTabs">
      <div class="tab active" onclick="switchTab('market', this)">市場狀態</div>
      <div class="tab" onclick="switchTab('accounts', this)">帳戶狀態</div>
      <div class="tab" onclick="switchTab('holdings', this)">股票狀態-帳戶</div>
      <div class="tab" onclick="switchTab('stocks', this)">股票狀態-標的</div>
    </div>
    <div class="tab-content" id="tabContent">
      <div class="loading">載入中...</div>
    </div>
  </div>

  <!-- 模塊 4：事件表 -->
  <div class="table-card" style="margin-top: 16px;">
    <div class="tabs" id="eventTabs">
      <div class="tab active" onclick="switchEventTab('account_events', this)">帳戶事件</div>
      <div class="tab" onclick="switchEventTab('trade_events', this)">股票事件</div>
      <div class="tab" onclick="switchEventTab('deposit_events', this)">定存事件</div>
    </div>
    <div class="event-filter-bar">
      <select id="eventTypeFilter" onchange="eventPage=0; renderEventTable()">
        <option value="ALL">全部類型</option>
      </select>
      <select id="eventPageSize" onchange="eventPage=0; renderEventTable()">
        <option value="20">20 筆</option>
        <option value="50">50 筆</option>
      </select>
      <span class="event-pager" id="eventPager"></span>
      <span class="event-count" id="eventCount"></span>
    </div>
    <div class="tab-content" id="eventTabContent">
      <div class="loading" style="cursor:pointer" onclick="loadEventData()">📋 點擊這裡載入帳戶事件資料</div>
    </div>
  </div>
</div>

<script>
// =============================================================================
// STR Alpha Dashboard - Frontend
// =============================================================================

// ===== 設定 =====
// 部署 Apps Script Web App 後，把 URL 貼到這裡
var API_URL = "https://script.google.com/macros/s/AKfycbzthsshqCiQ_365RjtPJN1hfuYc4wsMVhjiCq3bg41Ob-PhVNuXWNxwyu-uBBH6m6c/exec";

// ===== 全域資料 =====
var DATA = null;
var currentTab = "market";

// ===== 日期篩選 =====
var DATE_FROM = "";   // 預設留空（不設起日）
var DATE_TO = "";
var cachedAllTradeEvents = null;
var cachedAllDepositEvents = null;
var cachedAllAccountEvents = null;

// ===== 顏色 =====
var COLORS = ["#2B2D42", "#8D99AE", "#EF233C", "#D90429", "#3d4060", "#a8b2c0", "#ff4d5e", "#1a1b2e", "#c0c8d4"];
var KPI_BORDERS = ["#2B2D42", "#2B2D42", "#8D99AE", "#2B8A5E", "#EF233C", "#D90429"];

// ===== Chart 實例（由 chartInstances 管理）=====

// ===== 載入資料 =====
async function loadData() {
  // 清除日期篩選的事件快取（資料重整時需重新載入）
  cachedAllTradeEvents = null;
  cachedAllDepositEvents = null;
  cachedAllAccountEvents = null;

  if (!API_URL) {
    // Demo mode: 使用內嵌測試資料
    DATA = getDemoData();
    if (DATE_FROM) await loadAllEventsForDateFilter();
    render();
    return;
  }

  try {
    var res = await fetch(API_URL + "?action=all");
    DATA = await res.json();
    // 有起日時，同步載入事件資料（避免首次 render 時期間指標空白）
    if (DATE_FROM) await loadAllEventsForDateFilter();
    render();
  } catch (err) {
    document.getElementById("kpiGrid").innerHTML = '<div class="error">載入失敗: ' + err.message + '</div>';
  }
}

// ===== 載入所有事件資料（供日期篩選使用）=====
async function loadAllEventsForDateFilter() {
  if (!API_URL) {
    cachedAllTradeEvents  = getDemoEventData("trade_events");
    cachedAllDepositEvents = getDemoEventData("deposit_events");
    cachedAllAccountEvents = getDemoEventData("account_events");
    return;
  }
  try {
    var results = await Promise.all([
      fetch(API_URL + "?action=trades").then(function(r) { return r.json(); }),
      fetch(API_URL + "?action=deposit_events").then(function(r) { return r.json(); }),
      fetch(API_URL + "?action=account_events").then(function(r) { return r.json(); })
    ]);
    cachedAllTradeEvents  = results[0].trade_events   || [];
    cachedAllDepositEvents = results[1].deposit_events || [];
    cachedAllAccountEvents = results[2].account_events || [];
  } catch(e) {
    cachedAllTradeEvents  = [];
    cachedAllDepositEvents = [];
    cachedAllAccountEvents = [];
  }
}

// ===== 日期篩選變更 =====
async function onDateFilterChange() {
  DATE_FROM = document.getElementById("dateFrom").value;
  DATE_TO   = document.getElementById("dateTo").value;

  if (DATE_FROM && !cachedAllTradeEvents) {
    document.getElementById("kpiGrid").innerHTML = '<div class="loading">⏳ 載入期間事件資料中...</div>';
    await loadAllEventsForDateFilter();
  }

  render();
}

// ===== 期間股息（配息）by Ticker =====
function computePeriodDividendsByTicker(f, fromDate, toDate) {
  var result = {};
  if (!cachedAllAccountEvents) return result;

  function matchMarketCurrency(bid) {
    if (!f.market || f.market === "ALL") return true;
    return (f.market === "美股") ? (bid === "USD") : (bid === "TWD");
  }
  var investKeys = buildInvestAccountKeys(f.market);
  function matchAccount(r) {
    if (f.account !== "ALL") return (r["銀行"] + "-" + r["帳戶名"]) === f.account;
    if (investKeys) return !!investKeys[(r["銀行"]||"") + "-" + (r["帳戶名"]||"")];
    return true;
  }

  cachedAllAccountEvents.forEach(function(ae) {
    if ((ae["事件類型"]||"") !== "配息") return;
    var dt = ae["日期"] ? new Date(ae["日期"]) : null;
    if (!dt || dt < fromDate || dt > toDate) return;
    if (!matchMarketCurrency(ae["幣別"])) return;
    if (!matchAccount(ae)) return;
    var ticker = ae["Ticker"] || "";
    if (!ticker) return;
    result[ticker] = (result[ticker] || 0) + num(ae["金額"]);
  });

  return result;
}

// ===== 期間已實現損益：同時回傳 byTicker 與 byAcctTicker =====
function computeFIFOPeriodPnLMaps(f, fromDate, toDate) {
  var result = { byTicker: {}, byAcctTicker: {} };
  if (!cachedAllTradeEvents || cachedAllTradeEvents.length === 0) return result;

  function matchMarket(bid) {
    if (!f.market || f.market === "ALL") return true;
    return (f.market === "美股") ? (bid === "USD") : (bid === "TWD");
  }
  var investKeys = buildInvestAccountKeys(f.market);
  function matchAccount(r) {
    if (f.account !== "ALL") return (r["銀行"] + "-" + r["帳戶名"]) === f.account;
    if (investKeys) return !!investKeys[(r["銀行"]||"") + "-" + (r["帳戶名"]||"")];
    return true;
  }

  var trades = cachedAllTradeEvents.slice().sort(function(a, b) {
    return new Date(a["日期"]) - new Date(b["日期"]);
  });
  var avgPos = {};

  trades.forEach(function(t) {
    if (!matchMarket(t["幣別"])) return;
    if (!matchAccount(t)) return;

    var ticker    = t["Ticker"];
    var dir       = t["方向"];
    var shares    = num(t["股數"]);
    var amount    = num(t["成交金額"]);
    var newShares = num(t["分割/反分割後新股"]);
    var dt        = t["日期"] ? new Date(t["日期"]) : null;
    var acctKey   = (t["銀行"] || "") + "-" + (t["帳戶名"] || "");
    var queueKey  = acctKey + "|" + ticker;

    if (!ticker || !dt) return;
    if (!avgPos[queueKey]) avgPos[queueKey] = { shares: 0, totalCost: 0 };
    var pos = avgPos[queueKey];

    if (dir === "買" && shares > 0) {
      pos.shares    += shares;
      pos.totalCost += amount;
    } else if (dir === "賣" && shares > 0) {
      var avgCostPerShare = pos.shares > 0 ? pos.totalCost / pos.shares : 0;
      var costBasis = avgCostPerShare * shares;
      pos.shares    -= shares;
      pos.totalCost  = avgCostPerShare * pos.shares;
      if (dt >= fromDate && dt <= toDate) {
        var pnl = amount - costBasis;
        result.byTicker[ticker] = (result.byTicker[ticker] || 0) + pnl;
        result.byAcctTicker[queueKey] = (result.byAcctTicker[queueKey] || 0) + pnl;
      }
    } else if (newShares > 0 && dir !== "買" && dir !== "賣") {
      if (pos.shares > 0 && newShares !== pos.shares) pos.shares = newShares;
    }
  });

  return result;
}

// ===== 期間已實現損益（市場/帳戶層級，加權平均成本法）=====
function computeFIFORealizedPnL(f, fromDate, toDate, includedKeys) {
  if (!cachedAllTradeEvents || cachedAllTradeEvents.length === 0) return 0;

  function matchMarket(bid) {
    if (f.market === "ALL") return true;
    return (f.market === "美股") ? (bid === "USD") : (bid === "TWD");
  }
  function matchAccount(r) {
    if (f.account !== "ALL") return (r["銀行"] + "-" + r["帳戶名"]) === f.account;
    if (includedKeys) return !!includedKeys[(r["銀行"]||"") + "-" + (r["帳戶名"]||"")];
    return true;
  }

  var trades = cachedAllTradeEvents.slice().sort(function(a, b) {
    return new Date(a["日期"]) - new Date(b["日期"]);
  });
  var avgPos    = {};
  var periodPnL = 0;

  trades.forEach(function(t) {
    if (!matchMarket(t["幣別"])) return;
    if (!matchAccount(t)) return;

    var ticker    = t["Ticker"];
    var dir       = t["方向"];
    var shares    = num(t["股數"]);
    var amount    = num(t["成交金額"]);
    var newShares = num(t["分割/反分割後新股"]);
    var dt        = t["日期"] ? new Date(t["日期"]) : null;
    var acctKey   = (t["銀行"] || "") + "-" + (t["帳戶名"] || "");
    var queueKey  = acctKey + "|" + ticker;

    if (!ticker || !dt) return;
    if (!avgPos[queueKey]) avgPos[queueKey] = { shares: 0, totalCost: 0 };
    var pos = avgPos[queueKey];

    if (dir === "買" && shares > 0) {
      pos.shares    += shares;
      pos.totalCost += amount;
    } else if (dir === "賣" && shares > 0) {
      var avgCostPerShare = pos.shares > 0 ? pos.totalCost / pos.shares : 0;
      var costBasis = avgCostPerShare * shares;
      pos.shares    -= shares;
      pos.totalCost  = avgCostPerShare * pos.shares;
      if (dt >= fromDate && dt <= toDate) periodPnL += (amount - costBasis);
    } else if (newShares > 0 && dir !== "買" && dir !== "賣") {
      if (pos.shares > 0 && newShares !== pos.shares) pos.shares = newShares;
    }
  });

  return periodPnL;
}

// ===== 取得投資帳戶 key set { "銀行-帳戶名": true } =====
function buildInvestAccountKeys(market) {
  if (!market || market === "ALL") return null;
  if (!DATA || !DATA.account_config || DATA.account_config.length === 0) return null;
  var mktCurrency = (market === "美股") ? "USD" : "TWD";
  var keys = {};
  DATA.account_config.forEach(function(c) {
    if (c["是否投資帳戶"] && c["幣別"] === mktCurrency) {
      keys[(c["銀行"]||"") + "-" + (c["帳戶名"]||"")] = true;
    }
  });
  return Object.keys(keys).length > 0 ? keys : null;
}

// ===== 找出市場實際包含的帳戶集合（排除非投資帳戶）=====
function buildIncludedAccountKeys(f, overallRealizedTotal) {
  if (f.account !== "ALL") {
    var result = {}; result[f.account] = true; return result;
  }
  if (!f.market || f.market === "ALL" || !DATA || !DATA.account_status) return null;

  var mktCurrency = (f.market === "美股") ? "USD" : "TWD";

  var investSet = {};
  if (DATA.account_config && DATA.account_config.length > 0) {
    DATA.account_config.forEach(function(c) {
      if (c["是否投資帳戶"] && c["幣別"] === mktCurrency) {
        investSet[c["銀行"] + "|" + c["帳戶名"] + "|" + c["幣別"]] = true;
      }
    });
  }
  var hasInvestConfig = Object.keys(investSet).length > 0;

  var remaining = [];
  (DATA.account_status || []).forEach(function(a) {
    if (a["幣別"] !== mktCurrency) return;
    if (hasInvestConfig && !investSet[a["銀行"] + "|" + a["帳戶名"] + "|" + a["幣別"]]) return;
    remaining.push({ key: (a["銀行"]||"") + "-" + (a["帳戶名"]||""), realized: num(a["已實現總損益"]) });
  });

  var sum = remaining.reduce(function(s, c) { return s + c.realized; }, 0);
  if (Math.abs(sum - overallRealizedTotal) < 0.5) {
    var all = {}; remaining.forEach(function(c) { all[c.key] = true; }); return all;
  }

  for (var iter = 0; iter < 20; iter++) {
    var bestIdx = -1, bestDist = Math.abs(sum - overallRealizedTotal);
    for (var j = 0; j < remaining.length; j++) {
      var dist = Math.abs((sum - remaining[j].realized) - overallRealizedTotal);
      if (dist < bestDist) { bestDist = dist; bestIdx = j; }
    }
    if (bestIdx < 0) break;
    sum -= remaining[bestIdx].realized;
    remaining.splice(bestIdx, 1);
    if (Math.abs(sum - overallRealizedTotal) < 0.5) break;
  }

  var found = {}; remaining.forEach(function(c) { found[c.key] = true; }); return found;
}

// ===== 期間績效計算 =====
function computePeriodMetrics(f) {
  if (!DATE_FROM) return null;
  if (!cachedAllTradeEvents && !cachedAllAccountEvents) return null;

  var overallCapital, overallRealizedTotal;

  if (f.account !== "ALL") {
    var acctCurrency = f.currency
      || (f.market === "美股" ? "USD" : f.market === "台股" ? "TWD" : null);
    var acct = (DATA.account_status || []).find(function(a) {
      var keyMatch = (a["銀行"] + "-" + a["帳戶名"]) === f.account;
      if (!keyMatch) return false;
      if (acctCurrency) return a["幣別"] === acctCurrency;
      return true;
    });
    if (!acct) return null;
    overallCapital       = num(acct["總資本"]);
    overallRealizedTotal = num(acct["已實現總損益"]);
  } else {
    var row = (DATA.market_status || []).find(function(r) { return r["市場"] === f.market; });
    if (!row) return null;
    overallCapital       = num(row["總資本"]);
    overallRealizedTotal = num(row["已實現總損益"]);
  }

  var includedAcctKeys = buildIncludedAccountKeys(f, overallRealizedTotal);

  var fromDate = new Date(DATE_FROM + "T00:00:00+08:00");
  var toDate   = DATE_TO ? new Date(DATE_TO + "T23:59:59+08:00") : new Date();

  function inPeriod(d) { return d && d >= fromDate && d <= toDate; }
  function matchMarketCurrency(bid) {
    if (!f.market || f.market === "ALL") return true;
    return (f.market === "美股") ? (bid === "USD") : (bid === "TWD");
  }
  function matchAccount(r) {
    var key = (r["銀行"]||"") + "-" + (r["帳戶名"]||"");
    if (includedAcctKeys) return !!includedAcctKeys[key];
    return true;
  }

  if (f.account === "ALL" && f.market && f.market !== "ALL") {
    var mktCurrency = (f.market === "美股") ? "USD" : "TWD";
    overallCapital = 0;
    (DATA.account_status || []).forEach(function(a) {
      if (a["幣別"] !== mktCurrency) return;
      var key = a["銀行"] + "-" + a["帳戶名"];
      if (includedAcctKeys && !includedAcctKeys[key]) return;
      overallCapital += num(a["總資本"]);
    });
    if (cachedAllAccountEvents) {
      var netXferIn = 0;
      cachedAllAccountEvents.forEach(function(ae) {
        if (!matchMarketCurrency(ae["幣別"])) return;
        if (!matchAccount(ae)) return;
        if ((ae["事件類型"]||"") === "轉帳") netXferIn += num(ae["金額"]);
      });
      overallCapital -= netXferIn;
    }
  }

  var periodInterest  = 0;
  var INJECTION_TYPES = { "股本": 1, "換匯": 1, "轉帳": 1 };
  var INTEREST_TYPES  = { "利息": 1, "配息": 1 };

  if (cachedAllAccountEvents) {
    cachedAllAccountEvents.forEach(function(ae) {
      var dt = ae["日期"] ? new Date(ae["日期"]) : null;
      if (!inPeriod(dt)) return;
      if (!matchMarketCurrency(ae["幣別"])) return;
      if (!matchAccount(ae)) return;
      var type = ae["事件類型"] || "";
      var amt  = num(ae["金額"]);
      if (INTEREST_TYPES[type]) periodInterest += amt;
    });
  }

  var periodEquityPnL    = computeFIFORealizedPnL(f, fromDate, toDate, includedAcctKeys);
  var periodRealizedTotal = periodEquityPnL + periodInterest;
  var periodCapital      = overallCapital + overallRealizedTotal - periodRealizedTotal;
  var periodRealizedRate = periodCapital > 0 ? periodRealizedTotal / periodCapital : 0;

  return {
    capital:        periodCapital,
    realizedTotal:  periodRealizedTotal,
    realizedEquity: periodEquityPnL,
    interest:       periodInterest,
    realizedRate:   periodRealizedRate
  };
}

function populateAccountFilter() {
  var market = document.getElementById("marketFilter").value;
  var select = document.getElementById("accountFilter");
  var current = select.value;
  select.innerHTML = '<option value="ALL">全部帳戶</option>';

  if (!DATA || !DATA.account_status) return;

  // 建立投資帳戶快查集（只列出 是否投資帳戶=true 的帳戶）
  var investSet = {};
  if (DATA.account_config) {
    DATA.account_config.forEach(function(c) {
      if (c["是否投資帳戶"]) investSet[c["銀行"] + "|" + c["帳戶名"] + "|" + c["幣別"]] = true;
    });
  }

  var seen = {};
  DATA.account_status.forEach(function(a) {
    if (market !== "ALL") {
      var acctMarket = (a["幣別"] === "USD") ? "美股" : "台股";
      if (acctMarket !== market) return;
    }
    if (Object.keys(investSet).length > 0) {
      if (!investSet[a["銀行"] + "|" + a["帳戶名"] + "|" + a["幣別"]]) return;
    }
    var label = a["銀行"] + "-" + a["帳戶名"];
    if (seen[label]) return;
    seen[label] = true;
    var opt = document.createElement("option");
    opt.value = label;
    opt.textContent = label;
    select.appendChild(opt);
  });
  if (select.querySelector('option[value="' + current + '"]')) select.value = current;
}

function populateTickerFilter() {
  var market = document.getElementById("marketFilter").value;
  var select = document.getElementById("tickerFilter");
  var current = select.value;
  select.innerHTML = '<option value="ALL">全部標的</option>';

  if (!DATA || !DATA.equity_by_ticker) return;
  DATA.equity_by_ticker.forEach(function(e) {
    if (market !== "ALL" && e["市場"] !== market) return;
    if (num(e["總持有股數"]) <= 0) return;

    opt.textContent = e["Ticker"];
    select.appendChild(opt);

}

  var html = cards.map(function(c) {
    var vcls = c.cls ? " " + c.cls : "";
    var chartId = c.chartView || "allocation";

    var onclick = ' onclick="switchChartView(\'' + chartId + '\')"';

    var tip = c.tooltip ? ' data-tooltip="' + c.tooltip + '"' : '';
    var subTip = c.subTooltip ? ' data-tooltip="' + c.subTooltip + '"' : '';

      return '<div style="visibility:hidden"></div>';

          '<div class="position-bar-track">' +
            '<div class="position-bar-equity" style="width:' + eqPct + '%">' + (eqPct > 8 ? eqPct + '%' : '') + '</div>' +
            '<div class="position-bar-cash">' + (cashPct > 8 ? cashPct + '%' : '') + '</div>' +
          '</div>' +
          '<div class="position-bar-labels">' +
            '<span data-tooltip="持倉成本 / (持倉成本+可用現金+定存)">股票 ' + eqPct + '%</span>' +
            '<span data-tooltip="(可用現金+定存) / (持倉成本+可用現金+定存)">現金 ' + cashPct + '%</span>' +
          '</div>' +
        '</div>' +
        '</div>';
    }
    return '<div class="kpi-card' + activeClass + '" style="border-left-color:' + c.border + '"' + onclick + '>' +
      '<div class="label"' + tip + '>' + c.label + '</div>' +
      '<div class="value' + vcls + '">' + c.value + '</div>' +
      '<div class="sub"><span' + subTip + '>' + c.sub + '</span></div>' +
      '</div>';
  }).join("");

  document.getElementById("kpiGrid").innerHTML = html;
}

  var unrealTotalPnL  = num(row["未實現總損益"]);
  var unrealTotalRate = num(row["未實現總損益率"]);

// ===== 取得當前篩選層級的彙總數據 =====
function getFilteredSummary() {
  var f = getFilters();

  if (f.account !== "ALL") {
    // 帳戶層級：從帳戶狀態表取
    var acct = (DATA.account_status || []).find(function(a) {
      return (a["銀行"] + "-" + a["帳戶名"]) === f.account;
    });
    if (acct) return {
      cash: num(acct["可用現金"]) + num(acct["定存"]),
      realTotal: num(acct["已實現總損益"]),
      unrealTotal: num(acct["未實現總損益"])
    };
  }

  // 市場層級：從市場狀態表取
  var row = (DATA.market_status || []).find(function(r) { return r["市場"] === f.market; });
  if (row) return {
    cash: num(row["可用現金"]) + num(row["定存"]),
    realTotal: num(row["已實現總損益"]),
    unrealTotal: num(row["未實現總損益"])
  };

  return { cash: 0, realTotal: 0, unrealTotal: 0 };
}

// ===== 取得當前篩選的持倉列表 =====
function getFilteredEquities() {
  var f = getFilters();
  // 帳戶或標的有篩選時，用 equity_by_account（更細的粒度）
  if (f.account !== "ALL" || f.ticker !== "ALL") {
    return filterData(DATA.equity_by_account).filter(function(e) { return num(e["持有股數"]) > 0; });
  }
  // 市場層級用 equity_by_ticker
  return filterData(DATA.equity_by_ticker).filter(function(e) { return num(e["總持有股數"]) > 0; });
}

function renderAllocationCharts() {
  var summary = getFilteredSummary();
  var equities = getFilteredEquities();
  var isByAccount = getFilters().account !== "ALL" || getFilters().ticker !== "ALL";

  // 成本基準
  var costLabels = [], costValues = [];
  equities.forEach(function(e) {
    var label = isByAccount ? e["Ticker"] : e["Ticker"];
    var cost = num(isByAccount ? e["持有成本總額"] : e["總持有成本"]);
    if (cost > 0) { costLabels.push(label); costValues.push(cost); }
  });
  if (summary.cash > 0) { costLabels.push("現金+定存"); costValues.push(summary.cash); }

  // 市值基準
  var mktLabels = [], mktValues = [];
  equities.forEach(function(e) {
    var label = isByAccount ? e["Ticker"] : e["Ticker"];
    var mkt = num(isByAccount ? e["持倉市值"] : e["總持倉市值"]);
    if (mkt > 0) { mktLabels.push(label); mktValues.push(mkt); }
  });
  if (summary.cash > 0) { mktLabels.push("現金+定存"); mktValues.push(summary.cash); }

  chartInstances.chart1 = buildDoughnut("chart1", costLabels, costValues);
  chartInstances.chart2 = buildDoughnut("chart2", mktLabels, mktValues);
}

function renderUnrealizedChart() {
  var equities = getFilteredEquities();
  var isByAccount = getFilters().account !== "ALL" || getFilters().ticker !== "ALL";
  var items = [];

  equities.forEach(function(e) {
    var label = isByAccount ? (e["Ticker"] + "(" + e["帳戶名"] + ")") : e["Ticker"];
    var pnl = num(e["未實現損益"]);
    items.push({ label: label, value: pnl });

  items.sort(function(a, b) { return Math.abs(b.value) - Math.abs(a.value); });

  var labels = items.map(function(i) { return i.label; });
  var values = items.map(function(i) { return i.value; });
  var colors = values.map(function(v) { return v >= 0 ? "#2B8A5E" : "#D90429"; });

  chartInstances.chart1 = buildHorizontalBar("chart1", labels, values, colors);
}

// 自訂 plugin：畫連接線
var doughnutLabelLinePlugin = {
  id: "doughnutLabelLine",
  afterDraw: function(chart) {
    var ctx = chart.ctx;
    chart.data.datasets.forEach(function(dataset, di) {
      var meta = chart.getDatasetMeta(di);
      meta.data.forEach(function(element, index) {
        if (!chart._labelLineTop3 || !chart._labelLineTop3[index]) return;
        var pos = element.tooltipPosition();
        var outerRadius = element.outerRadius;
        var angle = (element.startAngle + element.endAngle) / 2;
        var midX = pos.x + Math.cos(angle) * (outerRadius * 0.15);
        var midY = pos.y + Math.sin(angle) * (outerRadius * 0.15);
        var endX = pos.x + Math.cos(angle) * (outerRadius * 0.35);
        var endY = pos.y + Math.sin(angle) * (outerRadius * 0.35);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(midX, midY);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = "#8D99AE";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.restore();
      });
    });
  }
};

function buildDoughnut(canvasId, labels, values) {
  var indexed = values.map(function(v, i) { return { v: v, i: i }; });
  indexed.sort(function(a, b) { return b.v - a.v; });
  var top3 = {};
  for (var k = 0; k < Math.min(3, indexed.length); k++) { top3[indexed[k].i] = true; }
  var total = values.reduce(function(a, b) { return a + b; }, 0);

  var chart = new Chart(document.getElementById(canvasId).getContext("2d"), {
    type: "doughnut",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: COLORS.slice(0, labels.length),
        borderWidth: 2,
        borderColor: "#fff",
        hoverOffset: 16,
        hoverBorderWidth: 3,
        hoverBorderColor: "#2B2D42"
      }]
    },
    plugins: [ChartDataLabels, doughnutLabelLinePlugin],
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: "50%",
      layout: { padding: { top: 40, bottom: 40, left: 40, right: 40 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx) {
          return ctx.label + ": " + fmtCurrency(ctx.raw) + " (" + ((ctx.raw / total) * 100).toFixed(1) + "%)";
        }}},
        datalabels: {
          display: function(ctx) { return top3[ctx.dataIndex] ? true : false; },
          color: "#2B2D42",
          font: { size: 10.5, weight: "600" },
          anchor: "end",
          align: "end",
          offset: 14,
          formatter: function(value, ctx) {
            var pct = ((value / total) * 100).toFixed(1);
            return ctx.chart.data.labels[ctx.dataIndex] + " " + pct + "%";
          }
        }
      }
    }
  });

  // 存 top3 資訊供連接線 plugin 使用
  chart._labelLineTop3 = top3;
  return chart;
}

// 日期格式化：ISO/各種格式 → YYYY/MM/DD
function fmtDate(v) {
  if (!v) return "";
  var s = String(v);
  // ISO 格式 2025-10-20T16:00:00.000Z
  if (s.indexOf("T") > 0) {
    var d = new Date(s);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "/" + m + "/" + day;
  }
  // 已經是 YYYY/MM/DD 或其他格式
  return s.split(" ")[0]; // 去掉時間部分
}

async function loadEventData() {
  document.getElementById("eventTabContent").innerHTML = '<div class="loading">載入中...</div>';
  eventPage = 0;

  try {
    var actionMap = { account_events: "account_events", trade_events: "trades", deposit_events: "deposit_events" };
    var dataKeyMap = { account_events: "account_events", trade_events: "trade_events", deposit_events: "deposit_events" };

    if (!API_URL) {
      eventData = getDemoEventData(currentEventTab);
    } else {
      try {
        var res = await fetch(API_URL + "?action=" + actionMap[currentEventTab]);
        var result = await res.json();
        eventData = result[dataKeyMap[currentEventTab]] || [];
      } catch (fetchErr) {
        // API 失敗時 fallback 到 Demo
        eventData = getDemoEventData(currentEventTab);
      }
      // API 回傳空也 fallback
      if (!eventData || eventData.length === 0) {
        eventData = getDemoEventData(currentEventTab);
      }
    }

    // 按日期排序（最新在前）
    eventData.sort(function(a, b) {
      var da = a["日期"] ? new Date(a["日期"]) : 0;
      var db = b["日期"] ? new Date(b["日期"]) : 0;
      return db - da;
    });

    populateEventFilters();
    renderEventTable();
  } catch (err) {
    document.getElementById("eventTabContent").innerHTML = '<div class="error">載入失敗: ' + err.message + '</div>';
  }
}

function populateEventFilters() {
  if (!eventData || eventData.length === 0) return;

  var typeSelect = document.getElementById("eventTypeFilter");
  typeSelect.innerHTML = '<option value="ALL">全部類型</option>';
  var types = {};
  eventData.forEach(function(e) {
    var t = e["交易類型"] || e["方向"] || "";
    if (t && !types[t]) { types[t] = true; var opt = document.createElement("option"); opt.value = t; opt.textContent = t; typeSelect.appendChild(opt); }
  });
}

function getFilteredEvents() {
  if (!eventData) return [];
  var typeFilter = document.getElementById("eventTypeFilter").value;
  var filtered = eventData;
  if (typeFilter !== "ALL") {
    filtered = eventData.filter(function(e) { return (e["交易類型"] || e["方向"]) === typeFilter; });
  }
  return filtered;
}

function renderEventTable() {
  var filtered = getFilteredEvents();
  var pageSize = parseInt(document.getElementById("eventPageSize").value) || 20;
  var totalPages = Math.ceil(filtered.length / pageSize);
  if (eventPage >= totalPages) eventPage = Math.max(0, totalPages - 1);

  var start = eventPage * pageSize;
  var display = filtered.slice(start, start + pageSize);

  // 渲染分頁
  var pagerHtml = "";
  if (totalPages > 1) {
    for (var p = 0; p < totalPages; p++) {
      pagerHtml += '<button class="' + (p === eventPage ? 'active' : '') + '" onclick="eventPage=' + p + '; renderEventTable()">' + (p + 1) + '</button>';
    }
  }
  document.getElementById("eventPager").innerHTML = pagerHtml;
  document.getElementById("eventCount").textContent = "第 " + (start + 1) + "-" + (start + display.length) + " 筆，共 " + filtered.length + " 筆";

  // 渲染表格
  var html = '<table><tr>';
  if (display.length > 0) {
    var keys = Object.keys(display[0]).filter(function(k) { return k !== "同步狀態" && k !== "ID"; });
    keys.forEach(function(k) { html += '<th>' + k + '</th>'; });
    html += '</tr>';
    display.forEach(function(row) {
      html += '<tr>';
      keys.forEach(function(k) {
        var v = row[k];
        // 日期欄位格式化
        if (k === "日期" || k === "到期日") {
          html += '<td>' + fmtDate(v) + '</td>';
        } else if (typeof v === "number" && k !== "股數" && k !== "天數" && k !== "持倉帳戶數") {
          html += '<td class="right">' + fmtCurrency(v) + '</td>';
        } else {
          html += '<td>' + (v !== null && v !== undefined ? v : "") + '</td>';
        }
      });
      html += '</tr>';
    });
  } else {
    html += '<td colspan="10" style="text-align:center; padding:20px; color:var(--gray)">無資料</td></tr>';
  }
  html += '</table>';

  document.getElementById("eventTabContent").innerHTML = html;
}

function renderMarketTable() {
  var f = getFilters();
  var data = (DATA.market_status || []).filter(function(r) { return r["市場"] === f.market; });
  var cols = ["市場", "總資本", "總資產", "NAV", "總損益", "總損益率",
    "股票倉位", "現金倉位", "持倉成本", "持倉市值",
    "未實現總損益", "未實現總損益率", "已實現總損益", "已實現總損益率",
    "利息與股息", "可用現金", "定存"];

  var html = '<table><tr>';
  cols.forEach(function(c) { html += '<th>' + c + '</th>'; });
  html += '</tr>';

  var rateCols = {"總損益率":1,"未實現總損益率":1,"已實現總損益率":1,"股票倉位":1,"現金倉位":1};
  var sumCols = {"總資本":0,"總資產":0,"NAV":0,"總損益":0,"持倉成本":0,"持倉市值":0,"未實現總損益":0,"已實現總損益":0,"利息與股息":0,"可用現金":0,"定存":0};

  // 日期篩選：若有起訖日，取期間指標覆蓋部分欄位
  var pm = (DATE_FROM && f.account === "ALL") ? computePeriodMetrics(f) : null;

  data.forEach(function(row) {
    var capital    = pm ? pm.capital      : num(row["總資本"]);
    var realTotal  = pm ? pm.realizedTotal : num(row["已實現總損益"]);
    var interest   = pm ? pm.interest      : num(row["利息與股息"]);
    var unrealTotal = num(row["未實現總損益"]);
    var totalPnL   = pm ? (realTotal + unrealTotal) : num(row["總損益"]);
    var totalRate  = capital > 0 ? totalPnL / capital : num(row["總損益率"]);
    var realRate   = capital > 0 ? realTotal / capital : num(row["已實現總損益率"]);
    var unrealRate = capital > 0 ? unrealTotal / capital : num(row["未實現總損益率"]);

    var override = {
      "總資本":         capital,
      "總損益":         totalPnL,
      "總損益率":       totalRate,
      "已實現總損益":   realTotal,
      "已實現總損益率": realRate,
      "利息與股息":     interest,
      "未實現總損益率": unrealRate
    };

    html += '<tr>';
    cols.forEach(function(c) {
      var v = (pm && c in override) ? override[c] : row[c];
      var n = num(v);
      if (c === "市場") {
        html += '<td><strong>' + row["市場"] + '</strong></td>';
      } else if (rateCols[c]) {
        html += '<td class="right ' + valCls(n) + '">' + fmtPercent(n) + '</td>';
      } else if (typeof v === "string" && v.includes("%")) {
        html += '<td class="right ' + valCls(num(v)) + '">' + v + '</td>';
      } else {
        html += '<td class="right ' + valCls(n) + '">' + fmtCurrency(n) + '</td>';
      }
      if (c in sumCols) sumCols[c] += (pm && c in override) ? override[c] : num(row[c]);
    });
    html += '</tr>';
  });

  html += '<tr style="font-weight:700;border-top:2px solid var(--border)">';
  cols.forEach(function(c) {
    if (c === "市場") {
      html += '<td>合計</td>';
    } else if (c in sumCols) {
      var n = sumCols[c];
      if (c === "總損益率")       n = sumCols["總資本"] > 0 ? sumCols["總損益"] / sumCols["總資本"] : 0;
      if (c === "已實現總損益率") n = sumCols["總資本"] > 0 ? sumCols["已實現總損益"] / sumCols["總資本"] : 0;
      if (c === "未實現總損益率") n = sumCols["總資本"] > 0 ? sumCols["未實現總損益"] / sumCols["總資本"] : 0;
      html += '<td class="right ' + valCls(n) + '">' + (rateCols[c] ? fmtPercent(n) : fmtCurrency(n)) + '</td>';
    } else {
      html += '<td class="right">-</td>';
    }
  });
  html += '</tr>';

  html += '</table>';
  return html;
}

// ===== 輔助函數 =====
function num(v) {
  if (typeof v === "number") return v;
  if (!v || v === "-" || v === "") return 0;
  var s = String(v);
  // 百分比字串：去掉 % 後除以 100，還原為小數
  if (s.includes("%")) {
    var cleaned = s.replace(/[%,\s()]/g, function(m) { return m === "(" ? "-" : ""; }).replace(")", "");
    return (parseFloat(cleaned) || 0) / 100;
  }
  return parseFloat(s.replace(/[$,\s()]/g, function(m) { return m === "(" ? "-" : ""; }).replace(")", "")) || 0;
}

function fmtCurrency(n) {
  if (n === 0) return "$0";
  var neg = n < 0;
  var abs = Math.abs(n);
  var formatted = abs >= 1000 ? abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : abs.toFixed(2);
  return (neg ? "-$" : "$") + formatted;
}

function fmtNum(n) { return n.toLocaleString("en-US"); }

function fmtPercent(n) {
  if (typeof n === "string" && n.includes("%")) return n;
  // n 永遠是小數（如 -0.029），乘 100 轉百分比
  return (n >= 0 ? "+" : "") + (n * 100).toFixed(2) + "%";
}

function fmtShort(n) {
  var abs = Math.abs(n);
  if (abs >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (abs >= 1e3) return (n / 1e3).toFixed(0) + "K";
  return n.toString();
}

function valCls(n) {
  if (n > 0) return "positive";
  if (n < 0) return "negative";
  return "neutral";
}

function getMarketData(market) {
  if (market === "ALL" && DATA.portfolio_status && DATA.portfolio_status.length > 0) {
    var p = DATA.portfolio_status[0];
    return {
      capital: num(p["總資本"]), invested: num(p["持倉成本"]),
      realizedPnL: num(p["已實現損益"]), interest: num(p["利息與股息"]),
      deposit: num(p["定存"]), cash: num(p["可用現金"]),
      marketValue: num(p["持倉市值"]), unrealizedPnL: num(p["未實現損益"]),
      totalPnL: num(p["總損益"]), totalReturn: num(p["總報酬率"])
    };
  }

  var row = (DATA.market_status || []).find(function(r) { return r["市場"] === market; });
  if (!row) return { capital: 0, invested: 0, realizedPnL: 0, interest: 0, deposit: 0, cash: 0, marketValue: 0, unrealizedPnL: 0, totalPnL: 0, totalReturn: 0 };

  return {
    capital: num(row["總資本"]), invested: num(row["持倉成本"]),
    realizedPnL: num(row["已實現股票損益"]), interest: num(row["利息與股息"]),
    deposit: num(row["定存"]), cash: num(row["可用現金"]),
    marketValue: num(row["持倉市值"]), unrealizedPnL: num(row["未實現損益"]),
    totalPnL: num(row["總損益"]), totalReturn: num(row["總報酬率"])
  };
}

function filterData(data, opts) {
  if (!data) return [];
  opts = opts || {};
  var f = getFilters();
  var market = opts.market || f.market;
  var account = opts.account || f.account;
  var ticker = opts.ticker || f.ticker;
  var currencyField = opts.currencyField;

  return data.filter(function(r) {
    // 市場篩選
    if (market !== "ALL") {
      if (currencyField) {
        if (!((market === "美股" && r[currencyField] === "USD") || (market === "台股" && r[currencyField] === "TWD"))) return false;
      } else if (r["市場"] && r["市場"] !== market) {
        return false;
      }
    }
    // 帳戶篩選
    if (account !== "ALL") {
      var rowAcct = (r["銀行"] || "") + "-" + (r["帳戶名"] || "");
      if (rowAcct !== account) return false;
    }
    // 標的篩選
    if (ticker !== "ALL" && r["標的"] && r["標的"] !== ticker) return false;
    return true;
  });
}

// 保留向後相容
function filterByMarket(data, market, currencyField) {
  return filterData(data, { market: market, currencyField: currencyField });
}

function isInvestmentAccount(a) {
  if (!DATA.account_config) return true;
  var match = DATA.account_config.find(function(c) {
    return c["銀行"] === a["銀行"] && c["帳戶名"] === a["帳戶名"] && c["幣別"] === a["幣別"];
  });
  return match ? match["是否投資帳戶"] === true || String(match["是否投資帳戶"]).toUpperCase() === "TRUE" : true;
}
